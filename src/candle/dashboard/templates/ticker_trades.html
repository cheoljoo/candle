<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕯️</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>거래 이력 — Candle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">

<header class="border-b bg-white">
  <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-semibold" id="page-title">거래 이력 — Candle</h1>
      <p class="text-xs text-slate-500" id="page-sub">종목 로딩 중...</p>
    </div>
    <a href="javascript:history.back()" class="text-sm text-slate-500 hover:underline">← 뒤로</a>
  </div>
</header>

{% include "_nav.html" %}

{% include "_type_legend.html" %}

<main class="max-w-7xl mx-auto p-4 space-y-6" id="main-content">
  <div class="text-center py-12 text-slate-400" id="loading-msg">데이터 로딩 중...</div>
</main>

<script>
(function () {
  const ENABLED_TYPES = new Set({{ enabled_types | tojson }});
  const TYPE_DESC = {{ type_descriptions | items | list | tojson }};
  // TYPE_DESC: [[code, [short, detail]], ...]  →  Map for O(1) lookup
  const TYPE_DESCRIPTIONS = new Map(TYPE_DESC.map(([k, v]) => [k, {short: v[0], detail: v[1]}]));

  const rawHash = (window.location.hash || '').replace(/^#/, '') || new URLSearchParams(window.location.search).get('t') || '';
  const colonIdx = rawHash.indexOf(':');
  const ticker = colonIdx >= 0 ? rawHash.slice(0, colonIdx) : rawHash;
  const focusType = colonIdx >= 0 ? rawHash.slice(colonIdx + 1) : null;

  if (!ticker) {
    document.getElementById('loading-msg').textContent = 'URL에 종목 코드가 없습니다. 예: ticker_trades.html#005930';
    return;
  }

  fetch(`data/trades/${encodeURIComponent(ticker)}.json`)
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(data => renderTrades(data))
    .catch(err => {
      const isNotFound = err.message.includes('404') || err.message.includes('Not Found');
      const msg = isNotFound
        ? `거래 데이터 없음 (${ticker}) — 백테스트가 실행되지 않은 종목입니다. make v2-backtest 후 make v2-dashboard를 실행하세요.`
        : `데이터 로드 실패: ${err.message}`;
      const el = document.getElementById('loading-msg');
      el.textContent = msg;
      el.className = 'text-amber-600 bg-amber-50 rounded p-4 text-sm';
    });

  function fmtNum(v) {
    if (v == null) return '—';
    const n = parseFloat(v);
    if (isNaN(n)) return '—';
    return n.toLocaleString('ko-KR', { maximumFractionDigits: 2 });
  }
  function fmtPct(v) {
    if (v == null) return '—';
    const n = parseFloat(v);
    if (isNaN(n)) return '—';
    return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
  }
  function pctClass(v) {
    if (v == null) return 'text-slate-400';
    return parseFloat(v) >= 0 ? 'text-emerald-700' : 'text-rose-700';
  }

  function buildSummary(types) {
    const rows = [];
    for (const [tname, trades] of Object.entries(types)) {
      const buys = trades.filter(t => t.side === 'buy');
      const sells = trades.filter(t => t.side === 'sell');
      let wins = 0, losses = 0, holdDays = [];
      sells.forEach(sell => {
        const prevBuys = buys.filter(b => b.date <= sell.date);
        if (!prevBuys.length) return;
        const lb = prevBuys[prevBuys.length - 1];
        const bp = parseFloat(lb.price || 0);
        const sp = parseFloat(sell.price || 0);
        if (bp > 0) { if (sp >= bp) wins++; else losses++; }
        const bd = new Date(lb.date), sd = new Date(sell.date);
        const diff = Math.round((sd - bd) / 86400000);
        if (diff >= 0) holdDays.push(diff);
      });
      const total = wins + losses;
      const wr = total ? (wins / total * 100).toFixed(1) : null;
      const ah = holdDays.length ? Math.round(holdDays.reduce((a,b) => a+b, 0) / holdDays.length) : null;
      // MDD from equity vals
      const eqVals = trades.map(t => {
        const hv = parseFloat(t.holding_value || 0);
        const c  = parseFloat(t.cash || 0);
        return !isNaN(c) && c > 0 ? hv + c : hv;
      });
      let peak = eqVals[0] || 0, maxDD = 0;
      eqVals.forEach(v => {
        if (v > peak) peak = v;
        if (peak > 0) { const dd = (peak - v) / peak * 100; if (dd > maxDD) maxDD = dd; }
      });
      const lastTrade = trades[trades.length - 1];
      const returnPct = lastTrade ? (lastTrade.return_pct != null ? parseFloat(lastTrade.return_pct) : null) : null;

      rows.push({ tname, buys: buys.length, sells: sells.length,
        winRate: wr, avgHold: ah, mdd: maxDD.toFixed(1),
        returnPct, totalTrades: trades.length });
    }
    return rows;
  }

  function renderTrades(data) {
    document.getElementById('page-title').textContent = `거래 이력 — ${data.ticker} ${data.name || ''}`;
    document.getElementById('page-sub').textContent = `그룹: ${data.group_name || ''} · 통화: ${data.currency || ''}`;

    const main = document.getElementById('main-content');
    main.innerHTML = '';

    const types = data.types || {};
    if (!Object.keys(types).length) {
      main.innerHTML = '<p class="text-slate-400">거래 데이터 없음</p>';
      return;
    }

    // ── 리스크 지표 설명 ──────────────────────────────────────────────
    const riskInfoHtml = `
      <section class="bg-white rounded-lg shadow-sm p-4">
        <div class="flex items-center justify-between mb-2">
          <h2 class="text-sm font-semibold text-slate-700">📊 리스크 지표 설명 — MDD &amp; 승률 &amp; 평균 보유일</h2>
          <button onclick="this.closest('section').querySelector('.risk-body').classList.toggle('hidden');this.textContent=this.textContent.trim()==='접기'?'펼치기':'접기';"
                  class="text-xs text-slate-400 hover:text-slate-600">펼치기</button>
        </div>
        <div class="risk-body hidden grid grid-cols-1 md:grid-cols-3 gap-4 text-xs text-slate-600">
          <div class="bg-amber-50 rounded p-3 border border-amber-100">
            <h3 class="font-semibold text-amber-700 mb-1">🟡 MDD — 최대 낙폭 (Max Drawdown)</h3>
            <p class="mb-2">백테스트 기간 중 <strong>고점 대비 최대로 떨어진 비율(%)</strong>입니다. 전략의 "최악의 순간"을 나타냅니다.</p>
            <ul class="space-y-0.5">
              <li><span class="text-emerald-600 font-semibold">≤ 10% 초록</span> — 방어적·안정적 전략</li>
              <li><span class="text-amber-600 font-semibold">10~25% 주황</span> — 보통 수준의 낙폭</li>
              <li><span class="text-rose-700 font-semibold">&gt; 25% 빨강</span> — 큰 낙폭, 버티기 어려움</li>
            </ul>
            <p class="mt-2 text-amber-700 bg-amber-100 rounded px-2 py-1">💡 수익률이 같다면 MDD가 낮은 전략이 우수. 낙폭이 클수록 공황 매도 위험이 높아집니다.</p>
          </div>
          <div class="bg-sky-50 rounded p-3 border border-sky-100">
            <h3 class="font-semibold text-sky-700 mb-1">🔵 승률 — Win Rate (%)</h3>
            <p class="mb-2">전체 매매 중 매도 시 매입가 대비 수익을 낸 <strong>비율(%)</strong>입니다.</p>
            <ul class="space-y-0.5">
              <li><span class="text-emerald-600 font-semibold">≥ 60% 초록</span> — 우수한 승률</li>
              <li><span class="text-amber-600 font-semibold">40~60% 주황</span> — 보통 수준</li>
              <li><span class="text-rose-700 font-semibold">&lt; 40% 빨강</span> — 낮은 승률</li>
            </ul>
            <p class="mt-2 text-amber-700 bg-amber-100 rounded px-2 py-1">⚠️ 승률이 낮아도 수익이 날 수 있음. 예) 승률 40% + 이익이 손실의 3배 = 기대값 양수. <strong>승률만으로 전략 우열을 판단하지 마세요.</strong></p>
          </div>
          <div class="bg-slate-50 rounded p-3 border border-slate-200">
            <h3 class="font-semibold text-slate-600 mb-1">⬜ 평균 보유일 (Avg Hold Days)</h3>
            <p class="mb-2">매수부터 매도까지 평균 며칠 보유했는지를 나타냅니다.</p>
            <ul class="space-y-0.5">
              <li>짧을수록: 잦은 매매 → 거래비용·세금 증가</li>
              <li>길수록: 추세를 충분히 기다리는 전략</li>
              <li>type1(변곡점): 수개월~수년 / type2(연속일수): 수주~수개월</li>
            </ul>
            <p class="mt-2 text-slate-500">계산: 각 매도의 직전 매수일 기준 (매도일 − 매수일) 평균. 그룹 내 전 종목 평균값으로 표시됩니다.</p>
          </div>
        </div>
      </section>`;
    main.insertAdjacentHTML('beforeend', riskInfoHtml);

    // 요약 카드
    const summaryRows = buildSummary(types);
    const summaryHtml = `
      <section class="bg-white rounded-lg shadow-sm p-4">
        <h2 class="text-base font-semibold mb-3">전략별 요약</h2>
        <div class="overflow-x-auto">
          <table class="min-w-full text-sm" data-sortable>
            <thead class="bg-slate-100 text-slate-600 text-xs">
              <tr>
                <th class="text-left px-3 py-2">전략</th>
                <th class="text-right px-3 py-2">매수</th>
                <th class="text-right px-3 py-2">매도</th>
                <th class="text-right px-3 py-2" title="마지막 거래 시점 누적 포트폴리오 수익률 (${data.period || 'full'} 기간)">최종 수익률</th>
                <th class="text-right px-3 py-2 text-amber-700">MDD (%)</th>
                <th class="text-right px-3 py-2 text-sky-700">승률 (%)</th>
                <th class="text-right px-3 py-2">보유일</th>
              </tr>
            </thead>
            <tbody>
              ${summaryRows.map(r => {
                const retCls = r.returnPct != null ? (r.returnPct >= 0 ? 'text-emerald-700 font-semibold' : 'text-rose-700 font-semibold') : 'text-slate-300';
                const mddCls = parseFloat(r.mdd) <= 10 ? 'text-emerald-600' : parseFloat(r.mdd) <= 25 ? 'text-amber-600' : 'text-rose-700';
                const wrCls = r.winRate != null ? (parseFloat(r.winRate) >= 60 ? 'text-emerald-600' : parseFloat(r.winRate) >= 40 ? 'text-amber-600' : 'text-rose-700') : 'text-slate-300';
                return `<tr class="border-t${ENABLED_TYPES.size && !ENABLED_TYPES.has(r.tname) ? ' opacity-50' : ''}">
                  <td class="px-3 py-2 font-mono font-semibold">${r.tname}${
                    ENABLED_TYPES.size
                      ? (ENABLED_TYPES.has(r.tname)
                          ? ' <span class="ml-1 text-xs px-1 py-0.5 bg-emerald-100 text-emerald-700 rounded">ON</span>'
                          : ' <span class="ml-1 text-xs px-1 py-0.5 bg-slate-200 text-slate-400 rounded">OFF</span>')
                      : ''
                  }</td>
                  <td class="px-3 py-2 text-right">${r.buys}</td>
                  <td class="px-3 py-2 text-right">${r.sells}</td>
                  <td class="px-3 py-2 text-right tabular-nums ${retCls}">${r.returnPct != null ? fmtPct(r.returnPct) : '—'}</td>
                  <td class="px-3 py-2 text-right tabular-nums ${mddCls}">${r.mdd}%</td>
                  <td class="px-3 py-2 text-right tabular-nums ${wrCls}">${r.winRate != null ? r.winRate + '%' : '—'}</td>
                  <td class="px-3 py-2 text-right text-slate-500">${r.avgHold != null ? r.avgHold + '일' : '—'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </section>`;
    main.insertAdjacentHTML('beforeend', summaryHtml);

    // ── 기간별 수익률 테이블 ──────────────────────────────────────────
    const periodList = data.period_list || [];
    const periodReturns = data.period_returns || {};
    if (periodList.length > 0 && Object.keys(periodReturns).length > 0) {
      const allTypeNames = Object.keys(types);
      const periodHeaders = periodList.map(p =>
        `<th class="text-right px-3 py-2 whitespace-nowrap font-normal text-slate-600" title="${p}">${p}</th>`
      ).join('');
      const periodRows = allTypeNames.map(tname => {
        const pmap = periodReturns[tname] || {};
        const cells = periodList.map(p => {
          const v = pmap[p];
          if (v == null) return `<td class="px-3 py-1.5 text-right text-slate-300 tabular-nums text-xs">—</td>`;
          const cls = v >= 0 ? 'text-emerald-700' : 'text-rose-700';
          return `<td class="px-3 py-1.5 text-right tabular-nums text-xs font-semibold ${cls}">${fmtPct(v)}</td>`;
        }).join('');
        const isOff = ENABLED_TYPES.size && !ENABLED_TYPES.has(tname);
        return `<tr class="border-t${isOff ? ' opacity-50' : ''}">
          <td class="px-3 py-1.5 font-mono font-semibold text-xs">${tname}</td>
          ${cells}
        </tr>`;
      }).join('');
      const periodTableHtml = `
      <section class="bg-white rounded-lg shadow-sm p-4">
        <h2 class="text-base font-semibold mb-1">📅 기간별 수익률</h2>
        <p class="text-xs text-slate-400 mb-3">각 백테스트 기간(Period) 종료 시점의 누적 포트폴리오 수익률입니다. <span class="font-medium text-slate-600">최종 수익률</span>은 평균이 아닌 해당 기간 마지막 거래 시점의 누적 수익률입니다.</p>
        <div class="overflow-x-auto">
          <table class="min-w-full text-sm" data-sortable>
            <thead class="bg-slate-100 text-slate-600 text-xs">
              <tr>
                <th class="text-left px-3 py-2">전략</th>
                ${periodHeaders}
              </tr>
            </thead>
            <tbody>${periodRows}</tbody>
          </table>
        </div>
      </section>`;
      main.insertAdjacentHTML('beforeend', periodTableHtml);
    }

    // ── 기간별 주식수 테이블 ──────────────────────────────────────────
    const periodSellQty = data.period_sell_qty || {};
    if (periodList.length > 0 && Object.keys(periodSellQty).length > 0) {
      const allTypeNames = Object.keys(types);
      function fmtQtyCell(first, lastBuy, final) {
        if (first == null && lastBuy == null) {
          return `<span class="text-slate-300" title="데이터 없음">—</span>`;
        }
        const fStr = first != null ? first.toLocaleString('ko-KR') : '?';
        const lStr = lastBuy != null ? lastBuy.toLocaleString('ko-KR') : '?';
        const fCls = (first != null && lastBuy != null && first > lastBuy)
          ? 'text-rose-700 font-semibold' : 'text-slate-500';
        const lCls = (first != null && lastBuy != null && lastBuy > first)
          ? 'text-emerald-700 font-semibold' : 'text-slate-500';
        const same = (lastBuy === final);
        const finalPart = (!same && final != null)
          ? `<span class="text-slate-400 text-[10px] ml-0.5">(${final.toLocaleString('ko-KR')})</span>` : '';
        return `<span class="${fCls}">${fStr}</span><span class="text-slate-300 mx-1">→</span><span class="${lCls}">${lStr}</span>${finalPart}`;
      }
      const periodQtyHeaders = periodList.map(p =>
        `<th class="text-right px-3 py-2 whitespace-nowrap font-normal text-slate-600">${p}</th>`
      ).join('');
      const periodQtyRows = allTypeNames.map(tname => {
        const pmap = periodSellQty[tname] || {};
        const cells = periodList.map(p => {
          const v = pmap[p];
          const cell = v ? fmtQtyCell(v.first, v.last_buy, v.final) : `<span class="text-slate-200">—</span>`;
          return `<td class="px-3 py-1.5 text-right tabular-nums text-xs">${cell}</td>`;
        }).join('');
        const isOff = ENABLED_TYPES.size && !ENABLED_TYPES.has(tname);
        return `<tr class="border-t${isOff ? ' opacity-50' : ''}">
          <td class="px-3 py-1.5 font-mono font-semibold text-xs">${tname}</td>
          ${cells}
        </tr>`;
      }).join('');
      const periodQtyHtml = `
      <section class="bg-white rounded-lg shadow-sm p-4">
        <h2 class="text-base font-semibold mb-1">📦 기간별 주식수</h2>
        <p class="text-xs text-slate-400 mb-3"><span class="text-slate-500 font-medium">처음주식수 → 최종주식수(마지막 가진 주식수)</span> — <b>처음주식수</b>: 첫 번째 BUY 시 매수한 qty. <b>최종주식수</b>: 마지막 BUY 후 holding_qty. <b>(마지막 가진 주식수)</b>: 마지막 SELL까지 고려한 최종 남은 주식수 (같으면 생략). <span class="text-rose-700">빨강</span>: 처음이 더 많음, <span class="text-emerald-700">초록</span>: 최종이 더 많음.</p>
        <div class="overflow-x-auto">
          <table class="min-w-full text-sm" data-sortable>
            <thead class="bg-slate-100 text-slate-600 text-xs">
              <tr>
                <th class="text-left px-3 py-2">전략</th>
                ${periodQtyHeaders}
              </tr>
            </thead>
            <tbody>${periodQtyRows}</tbody>
          </table>
        </div>
      </section>`;
      main.insertAdjacentHTML('beforeend', periodQtyHtml);
    }

    // 전략별 상세 거래 테이블 + 차트
    for (const [tname, trades] of Object.entries(types)) {
      const btn_id = `btn-${tname}`;
      const tbl_id = `tbl-${tname}`;
      const chart_id = `chart-${tname}`;
      // type2_2_opt: plus_days / minus_days 배지
      const optParams = (data.type_params || {})[tname];
      const optBadge = optParams
        ? `<span class="ml-2 text-xs px-2 py-0.5 bg-violet-100 text-violet-700 rounded border border-violet-200 font-mono">+${optParams.plus_days}일 / −${optParams.minus_days}일</span>`
        : '';
      const rows = trades.map(t => {
        const sideCls = t.side === 'buy' ? 'text-emerald-700 font-semibold' :
                        t.side === 'sell' ? 'text-rose-700 font-semibold' : 'text-slate-400 italic';
        const retCls = pctClass(t.return_pct);
        // Buy-Sell 수익률: 이익=빨강, 손실=파랑
        const bsRet = t.buy_sell_return_pct;
        const bsRetCls = (t.side === 'sell' && bsRet != null)
          ? (parseFloat(bsRet) >= 0 ? 'text-red-700 font-bold' : 'text-blue-700 font-bold')
          : 'text-slate-300';
        return `<tr class="border-t hover:bg-slate-50">
          <td class="px-3 py-1.5 font-mono text-xs">${t.date}</td>
          <td class="px-3 py-1.5 text-xs ${sideCls}">${t.side}</td>
          <td class="px-3 py-1.5 text-right tabular-nums text-xs">${fmtNum(t.price)}</td>
          <td class="px-3 py-1.5 text-right tabular-nums text-xs">${fmtNum(t.qty)}</td>
          <td class="px-3 py-1.5 text-right tabular-nums text-xs">${fmtNum(t.amount)}</td>
          <td class="px-3 py-1.5 text-right tabular-nums text-xs">${fmtNum(t.holding_qty)}</td>
          <td class="px-3 py-1.5 text-right tabular-nums text-xs">${fmtNum(t.holding_value)}</td>
          <td class="px-3 py-1.5 text-right tabular-nums text-xs">${t.cash != null ? fmtNum(t.cash) : '—'}</td>
          <td class="px-3 py-1.5 text-right tabular-nums text-xs ${bsRetCls}">${(t.side === 'sell' && bsRet != null) ? fmtPct(bsRet) : '—'}</td>
          <td class="px-3 py-1.5 text-right tabular-nums text-xs ${retCls}">${t.return_pct != null ? fmtPct(t.return_pct) : '—'}</td>
        </tr>`;
      }).join('');

      const isOn = !ENABLED_TYPES.size || ENABLED_TYPES.has(tname);
      const tdesc = TYPE_DESCRIPTIONS.get(tname);
      const onOffBadge = ENABLED_TYPES.size
        ? (isOn
            ? '<span class="ml-2 text-xs px-1.5 py-0.5 bg-emerald-100 text-emerald-700 rounded">ON</span>'
            : '<span class="ml-2 text-xs px-1.5 py-0.5 bg-slate-200 text-slate-400 rounded">OFF</span>')
        : '';
      const descHtml = tdesc
        ? `<div class="mt-0.5 text-xs text-slate-500"><span class="font-medium text-slate-700">${tdesc.short}</span> — ${tdesc.detail}</div>`
        : '';
      const sectionHtml = `
        <section class="bg-white rounded-lg shadow-sm p-4" id="section-${tname}">
          <div class="flex items-center justify-between mb-2">
            <div>
              <h2 class="text-sm font-semibold font-mono">${tname} — 거래 상세 (${trades.length}건)${onOffBadge}${optBadge}</h2>
              ${descHtml}
            </div>
            <button id="${btn_id}" onclick="toggleTable('${tbl_id}','${btn_id}')"
                    class="text-xs px-3 py-1 bg-slate-100 hover:bg-slate-200 rounded border border-slate-300 text-slate-600 flex-shrink-0 ml-4">
              펼치기 ▼
            </button>
          </div>
          ${isOn ? `<div class="mb-3"><canvas id="${chart_id}" style="max-height:320px"></canvas></div>` : ''}
          <div id="${tbl_id}" class="hidden overflow-x-auto">
            <table class="min-w-full text-xs border-collapse" data-sortable>
              <thead class="bg-slate-100 text-slate-500">
                <tr>
                  <th class="text-left px-3 py-2">날짜</th>
                  <th class="text-left px-3 py-2">구분</th>
                  <th class="text-right px-3 py-2">가격</th>
                  <th class="text-right px-3 py-2">수량</th>
                  <th class="text-right px-3 py-2">금액</th>
                  <th class="text-right px-3 py-2">보유수량</th>
                  <th class="text-right px-3 py-2">보유가치</th>
                  <th class="text-right px-3 py-2">현금</th>
                  <th class="text-right px-3 py-2 text-rose-700">Buy-Sell 수익률</th>
                  <th class="text-right px-3 py-2">수익률</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </section>`;
      main.insertAdjacentHTML('beforeend', sectionHtml);
      // 차트 빌드 (DOM 삽입 직후, ON 전략만)
      if (isOn) buildTradeChart(chart_id, tname, trades, data.prices || {});
    }

    const footer = `<p class="text-xs text-slate-400">기준일 {{ as_of }} · 생성 {{ generated_at }}</p>`;
    main.insertAdjacentHTML('beforeend', footer);

    // 정렬 가능 테이블 초기화 (동적 DOM 삽입 후)
    if (window.initAllSortableTables) window.initAllSortableTables();

    // focusType이 지정된 경우 해당 type 섹션 자동 펼침 + 스크롤
    if (focusType && document.getElementById(`tbl-${focusType}`)) {
      const tbl = document.getElementById(`tbl-${focusType}`);
      const btn = document.getElementById(`btn-${focusType}`);
      const sec = document.getElementById(`section-${focusType}`);
      if (tbl && tbl.classList.contains('hidden')) {
        tbl.classList.remove('hidden');
        if (btn) btn.textContent = '접기 ▲';
      }
      // 섹션 강조 테두리
      if (sec) {
        sec.classList.add('ring-2', 'ring-indigo-400');
        setTimeout(() => sec.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
      }
    }
  }

  // ── 거래 이력 차트 ──────────────────────────────────────────────────
  function buildTradeChart(canvasId, tname, trades, prices) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;

    const pDates  = (prices.dates  || []);
    const pCloses = (prices.closes || []);
    const pMa10m  = (prices.ma10m  || []);

    // 가격 데이터가 없으면 차트 숨김
    if (!pDates.length) {
      canvas.closest('.mb-3')?.remove();
      return;
    }

    const dateSet = new Set(pDates);

    // ── 보유수량 step-line ──────────────────────────────────────────
    const sortedTrades = [...trades]
      .filter(t => t.side === 'buy' || t.side === 'sell')
      .sort((a, b) => a.date < b.date ? -1 : 1);

    const holdingQtyArr = pDates.map(d => {
      let qty = 0;
      for (const t of sortedTrades) {
        if (t.date <= d) qty = parseFloat(t.holding_qty) || 0;
        else break;
      }
      return qty;
    });

    // ── 현금 step-line (cash tracking 전략만) ──────────────────────
    const cashArr = pDates.map(d => {
      let cash = null;
      for (const t of sortedTrades) {
        if (t.date <= d) cash = t.cash != null ? parseFloat(t.cash) : null;
        else break;
      }
      return cash;
    });

    // ── 주식수 × 종가 + 현금 (평가액+현금) ─────────────────────────
    const equityArr = pDates.map((d, i) => {
      const qty   = holdingQtyArr[i];
      const close = parseFloat(pCloses[i]);
      const cash  = cashArr[i];
      if (cash == null || isNaN(close)) return null;
      return qty * close + cash;
    });
    const hasEquity = equityArr.some(v => v != null);

    // ── 매수 / 매도 포인트 ─────────────────────────────────────────
    const tradeByDate = {};
    trades.forEach(t => {
      if ((t.side === 'buy' || t.side === 'sell') && dateSet.has(t.date)) {
        tradeByDate[t.date] = t;
      }
    });
    const buyPrices  = pDates.map(d => (tradeByDate[d]?.side === 'buy'  ? parseFloat(tradeByDate[d].price) : null));
    const sellPrices = pDates.map(d => (tradeByDate[d]?.side === 'sell' ? parseFloat(tradeByDate[d].price) : null));

    // ── tooltip 추가 데이터 ────────────────────────────────────────
    const tradeInfo = pDates.map((d, i) => {
      const t = tradeByDate[d];
      if (!t) return null;
      return {
        side:   t.side,
        cash:   t.cash != null ? fmtNum(t.cash) : '—',
        qty:    t.holding_qty != null ? fmtNum(t.holding_qty) : '—',
        bsr:    t.buy_sell_return_pct != null ? fmtPct(t.buy_sell_return_pct) : null,
        equity: equityArr[i] != null ? fmtNum(equityArr[i]) : null,
      };
    });

    new Chart(canvas, {
      type: 'line',
      data: {
        labels: pDates,
        datasets: [
          {
            label: '종가',
            data: pCloses,
            borderColor: 'rgb(71,85,105)',
            backgroundColor: 'transparent',
            borderWidth: 1.5,
            pointRadius: 0,
            tension: 0,
            yAxisID: 'yPrice',
            order: 3,
          },
          {
            label: '10월 MA',
            data: pMa10m.length ? pMa10m : null,
            borderColor: 'rgb(234,88,12)',
            backgroundColor: 'transparent',
            borderWidth: 1.5,
            borderDash: [5, 3],
            pointRadius: 0,
            tension: 0,
            spanGaps: false,
            yAxisID: 'yPrice',
            order: 4,
          },
          {
            label: '매수',
            data: buyPrices,
            borderColor: 'rgb(22,163,74)',
            backgroundColor: 'rgb(22,163,74)',
            pointStyle: 'triangle',
            pointRadius: 8,
            pointHoverRadius: 10,
            showLine: false,
            spanGaps: false,
            yAxisID: 'yPrice',
            order: 1,
          },
          {
            label: '매도',
            data: sellPrices,
            borderColor: 'rgb(220,38,38)',
            backgroundColor: 'rgb(220,38,38)',
            pointStyle: 'triangle',
            rotation: 180,
            pointRadius: 8,
            pointHoverRadius: 10,
            showLine: false,
            spanGaps: false,
            yAxisID: 'yPrice',
            order: 2,
          },
          {
            label: '보유수량',
            data: holdingQtyArr,
            borderColor: 'rgba(34,197,94,0.6)',
            backgroundColor: 'rgba(34,197,94,0.18)',
            borderWidth: 1,
            pointRadius: 0,
            fill: true,
            tension: 0,
            stepped: 'before',
            yAxisID: 'yQty',
            order: 5,
          },
          ...(hasEquity ? [{
            label: '평가액+현금',
            data: equityArr,
            borderColor: 'rgb(99,102,241)',
            backgroundColor: 'transparent',
            borderWidth: 1.5,
            pointRadius: 0,
            tension: 0,
            spanGaps: false,
            yAxisID: 'yEquity',
            order: 6,
          }] : []),
        ],
      },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { position: 'top', labels: { boxWidth: 12, font: { size: 11 } } },
          tooltip: {
            callbacks: {
              label(ctx) {
                const ds = ctx.dataset.label;
                const v  = ctx.parsed.y;
                if (v == null || isNaN(v)) return null;
                const base = `${ds}: ${fmtNum(v)}`;
                if (ds === '매수' || ds === '매도') {
                  const info = tradeInfo[ctx.dataIndex];
                  if (info) {
                    const lines = [base, `  현금: ${info.cash}`, `  보유수량: ${info.qty}`];
                    if (info.equity != null) lines.push(`  평가액+현금: ${info.equity}`);
                    if (info.bsr) lines.push(`  Buy-Sell 수익률: ${info.bsr}`);
                    return lines;
                  }
                }
                return base;
              },
            },
          },
        },
        scales: {
          x: {
            ticks: { maxTicksLimit: 8, font: { size: 10 }, maxRotation: 0 },
            grid: { display: false },
          },
          yPrice: {
            position: 'left',
            ticks: { color: 'rgb(71,85,105)', font: { size: 10 }, maxTicksLimit: 6 },
            title: { display: true, text: '가격', font: { size: 10 }, color: 'rgb(71,85,105)' },
          },
          yQty: {
            position: 'right',
            display: true,
            ticks: { color: 'rgba(34,197,94,0.85)', font: { size: 10 }, maxTicksLimit: 4 },
            title: { display: true, text: '보유수량', font: { size: 10 }, color: 'rgba(34,197,94,0.85)' },
            grid: { drawOnChartArea: false },
          },
          ...(hasEquity ? {
            yEquity: {
              position: 'right',
              ticks: { color: 'rgb(99,102,241)', font: { size: 10 }, maxTicksLimit: 6 },
              title: { display: true, text: '평가액+현금', font: { size: 10 }, color: 'rgb(99,102,241)' },
              grid: { drawOnChartArea: false },
            },
          } : {}),
        },
      },
    });
  }

  window.toggleTable = function(tblId, btnId) {
    const tbl = document.getElementById(tblId);
    const btn = document.getElementById(btnId);
    if (tbl.classList.contains('hidden')) {
      tbl.classList.remove('hidden');
      btn.textContent = '접기 ▲';
    } else {
      tbl.classList.add('hidden');
      btn.textContent = '펼치기 ▼';
    }
  };
})();
</script>

</body>
</html>
