{# 전략 type 이름 설명 범례 — 공통 partial #}
{% if type_descriptions %}
<details class="bg-slate-50 border rounded-lg text-xs text-slate-600 mt-0">
  <summary class="px-4 py-2 cursor-pointer font-medium select-none hover:bg-slate-100 rounded-lg">
    전략 코드 설명 ▾
  </summary>
  <div class="px-4 py-3 grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-1">
    {% for code, (short, detail) in type_descriptions.items() %}
    <div class="flex gap-2 items-baseline">
      <span class="font-mono font-semibold text-slate-800 w-16 shrink-0">{{ code }}</span>
      <span><span class="font-medium">{{ short }}</span>
        <span class="text-slate-400 ml-1">— {{ detail }}</span>
      </span>
    </div>
    {% endfor %}
  </div>
</details>
{% endif %}
