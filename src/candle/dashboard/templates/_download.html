{# CSV 다운로드 공통 유틸리티 — 각 템플릿에서 {% include "_download.html" %} #}
<script>
function _csvEscape(v) {
  if (v === null || v === undefined) return '';
  const s = String(v);
  return s.includes(',') || s.includes('"') || s.includes('\n')
    ? '"' + s.replace(/"/g, '""') + '"' : s;
}

function downloadTableCSV(tableId, filename) {
  const tbl = document.getElementById(tableId);
  if (!tbl) return;
  const rows = [];
  tbl.querySelectorAll('tr').forEach(tr => {
    const cells = [...tr.querySelectorAll('th,td')].map(c => _csvEscape(c.innerText.trim()));
    if (cells.some(c => c !== '')) rows.push(cells.join(','));
  });
  _triggerDownload(rows.join('\n'), filename);
}

function downloadJSONasCSV(data, columns, filename) {
  if (!data || !data.length) return;
  const cols = columns || Object.keys(data[0]);
  const header = cols.join(',');
  const body = data.map(row => cols.map(c => _csvEscape(row[c])).join(','));
  _triggerDownload([header, ...body].join('\n'), filename);
}

function _triggerDownload(content, filename) {
  const bom = '﻿'; // UTF-8 BOM — Excel 한글 깨짐 방지
  const blob = new Blob([bom + content], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.style.display = 'none';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
</script>
