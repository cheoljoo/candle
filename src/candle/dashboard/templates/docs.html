<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕯️</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>문서 — Candle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- marked.js: markdown → HTML -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <!-- highlight.js: 코드 블록 syntax highlight -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
    /* Markdown prose styles */
    .md-body { line-height: 1.7; color: #1e293b; }
    .md-body h1 { font-size: 1.6rem; font-weight: 700; margin: 1.4rem 0 0.8rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.4rem; }
    .md-body h2 { font-size: 1.25rem; font-weight: 700; margin: 1.4rem 0 0.6rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3rem; }
    .md-body h3 { font-size: 1.05rem; font-weight: 600; margin: 1.2rem 0 0.4rem; color: #334155; }
    .md-body h4 { font-size: 0.95rem; font-weight: 600; margin: 1rem 0 0.3rem; color: #475569; }
    .md-body p  { margin: 0.6rem 0; }
    .md-body ul, .md-body ol { margin: 0.5rem 0 0.5rem 1.4rem; }
    .md-body li { margin: 0.2rem 0; }
    .md-body li ul, .md-body li ol { margin: 0.1rem 0 0.1rem 1.2rem; }
    .md-body blockquote { border-left: 3px solid #94a3b8; padding: 0.3rem 0.8rem; margin: 0.6rem 0; color: #64748b; background: #f8fafc; }
    .md-body table { border-collapse: collapse; width: 100%; margin: 0.8rem 0; font-size: 0.875rem; }
    .md-body th { background: #f1f5f9; padding: 0.4rem 0.8rem; text-align: left; border: 1px solid #cbd5e1; font-weight: 600; }
    .md-body td { padding: 0.35rem 0.8rem; border: 1px solid #e2e8f0; }
    .md-body tr:nth-child(even) { background: #f8fafc; }
    .md-body code { font-family: ui-monospace, monospace; font-size: 0.83em; background: #f1f5f9; padding: 0.1em 0.35em; border-radius: 3px; color: #be185d; }
    .md-body pre  { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 1rem; overflow-x: auto; margin: 0.8rem 0; }
    .md-body pre code { background: none; padding: 0; color: inherit; font-size: 0.85em; }
    .md-body a { color: #2563eb; text-decoration: underline; }
    .md-body hr { border: none; border-top: 1px solid #e2e8f0; margin: 1.2rem 0; }
    .md-body strong { font-weight: 700; }
    .md-body em { font-style: italic; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

<header class="border-b bg-white">
  <div class="max-w-screen-2xl mx-auto px-4 py-4 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-semibold">Candle Dashboard — 문서</h1>
      <p class="text-xs text-slate-500">기준일 {{ as_of }} · 생성 {{ generated_at }}</p>
    </div>
  </div>
</header>

{% include "_nav.html" %}

{# 문서 데이터를 JSON으로 삽입 — Jinja2 tojson 필터로 안전하게 이스케이프 #}
<script>
const DOCS_DATA = {{ docs | tojson }};
</script>

<div class="max-w-screen-2xl mx-auto flex gap-0 min-h-[calc(100vh-7rem)]"
     x-data="docsApp()"
     x-init="init()">

  {# ── 왼쪽 사이드바 — 문서 목록 ── #}
  <aside class="w-56 shrink-0 border-r bg-white sticky top-0 self-start h-screen overflow-y-auto">
    <div class="p-4">
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">문서 목록</p>
      <ul class="space-y-1">
        <template x-for="(doc, i) in docs" :key="i">
          <li>
            <button
              @click="select(i)"
              class="w-full text-left px-3 py-2 rounded-lg text-sm transition-colors"
              :class="selected === i
                ? 'bg-slate-800 text-white font-medium'
                : 'text-slate-600 hover:bg-slate-100'"
            >
              <div class="font-medium truncate" x-text="doc.label"></div>
              <div class="text-xs opacity-60 truncate mt-0.5" x-text="doc.filename"></div>
            </button>
          </li>
        </template>
      </ul>
    </div>
    <div class="px-4 pb-4">
      <p class="text-xs text-slate-400">{{ docs|length }}개 문서 · claude/</p>
    </div>
  </aside>

  {# ── 오른쪽 — 문서 내용 ── #}
  <main class="flex-1 min-w-0 bg-white">
    {# 문서 헤더 #}
    <div class="border-b px-8 py-3 flex items-center justify-between bg-slate-50">
      <div class="flex items-center gap-3">
        <span class="text-base font-semibold text-slate-800" x-text="docs[selected]?.label"></span>
        <span class="text-xs text-slate-400 font-mono" x-text="docs[selected]?.filename"></span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs text-slate-400" x-text="lineCount + ' 줄'"></span>
        {# 렌더링 모드 토글 #}
        <div class="flex rounded-lg border border-slate-200 overflow-hidden text-xs">
          <button
            @click="rawMode = false"
            :class="!rawMode ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 hover:bg-slate-50'"
            class="px-3 py-1 transition-colors font-medium">
            Markdown
          </button>
          <button
            @click="rawMode = true"
            :class="rawMode ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 hover:bg-slate-50'"
            class="px-3 py-1 transition-colors font-medium">
            Raw
          </button>
        </div>
      </div>
    </div>

    {# Markdown 렌더링 #}
    <div x-show="!rawMode" class="px-8 py-6 md-body max-w-4xl" x-html="html"></div>

    {# Raw 모드 #}
    <div x-show="rawMode" class="px-8 py-6">
      <pre class="text-xs text-slate-700 whitespace-pre-wrap font-mono leading-relaxed bg-slate-50 p-4 rounded-lg border border-slate-200 overflow-x-auto"
           x-text="docs[selected]?.content"></pre>
    </div>
  </main>

</div>

<script>
// marked.js 설정 — GFM (GitHub Flavored Markdown) 활성화
marked.setOptions({
  breaks: true,
  gfm: true,
});

// highlight.js 를 marked 코드 블록 renderer 에 연결
const renderer = new marked.Renderer();
renderer.code = function(code, lang) {
  const language = hljs.getLanguage(lang) ? lang : 'plaintext';
  const highlighted = hljs.highlight(code, { language }).value;
  return `<pre><code class="hljs language-${language}">${highlighted}</code></pre>`;
};
marked.setOptions({ renderer });

function docsApp() {
  return {
    docs: DOCS_DATA,
    selected: 0,
    rawMode: false,

    get html() {
      const content = this.docs[this.selected]?.content || '';
      return marked.parse(content);
    },

    get lineCount() {
      const content = this.docs[this.selected]?.content || '';
      return content.split('\n').length.toLocaleString();
    },

    select(i) {
      this.selected = i;
    },

    init() {
      // 초기 문서를 첫 번째로 설정
      this.selected = 0;
    },
  }
}
</script>

</body>
</html>
