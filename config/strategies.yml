# req.md §1.1.2
# 각 backtest type 의 파라미터.

initial_capital:
  KRW: 10000000     # 1천만원
  USD: 1000

type1_1:
  description: "신호(-→+ 매수, +→- 매도) — 고정 10주"
  qty: 10

type1_2:
  description: "신호 — 가용 현금 전액 매수 / 전량 매도"

type2_1:
  description: "plus_days/minus_days 카운터 (8/4) — 10주"
  plus_days: 8
  minus_days: 4
  qty: 10

type2_2:
  description: "plus_days/minus_days 카운터 (8/4) — 전액/전량"
  plus_days: 8
  minus_days: 4

type2_1b:
  description: "plus_days/minus_days 카운터 (33/5) — 10주"
  plus_days: 33
  minus_days: 5
  qty: 10

type2_2b:
  description: "plus_days/minus_days 카운터 (33/5) — 전액/전량"
  plus_days: 33
  minus_days: 5

type3:
  description: "신호 무시. 3개월(90일)마다 적립식 매수, 매도 없음."
  interval_days: 90

type0_2:
  description: "매수 후 보유 — 첫 거래일에 KRW/USD 전액 매수, 매도 없음, 종가로만 수익률 평가."

type2_2_opt:
  description: >
    종목별 최적화 plus_days/minus_days로 type2_2 실행.
    optimize-streak --all-groups 결과(output/optimize/per_ticker/{group}/_summary.json)에서
    각 종목의 최적 파라미터를 로드하여 전액매수/전량매도 전략 수행.
    파라미터가 없는 종목은 type2_2b 기본값(plus=33, minus=5)으로 폴백.
  fallback_plus_days: 1
  fallback_minus_days: 5

# ─────────────────────────────────────────────────────────────────────────────
# 활성화할 backtest type 목록
#
# OFF 하려면: 해당 항목을 # 주석 처리하거나 목록에서 제거
# OFF된 type: backtest / compare / simulate rule 에서 제외됨
#
# 전략별 요약 페이지(compare.html)의 "전략 코드 설명" 섹션에는
# 모든 type이 표시되며, 각 type의 ON/OFF 상태가 뱃지로 표시됩니다.
# ─────────────────────────────────────────────────────────────────────────────
enabled_types:
  - type1_2
  - type2_2
  - type2_2b
  - type3
  - type0_2
  - type2_2_opt
