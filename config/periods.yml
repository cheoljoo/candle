# backtest 기간 정의
#
# 필드 설명:
#   label   : output/backtest/{label}/ 디렉터리명 (고정 식별자)
#   from    : 시작일 YYYY-MM-DD
#   to      : 종료일 YYYY-MM-DD (생략 시 실행 당일까지)
#   rolling : "Ny" — 실행 시점 기준 N년 전을 from으로 사용 (from 대신 사용)
#   markets : 이 기간을 실행할 시장 목록 (all | kr | us)
#             all = make v2-backtest, kr = make v2-backtest-kr, us = make v2-backtest-us
#
# workers 설명:
#   기간별 병렬 실행 수. 0 또는 미지정 시 기간 수 만큼 병렬 실행 (기존 make -j 동작과 동일).
#   1 이면 순차 실행. candle backtest-all --workers N 으로 CLI에서 개별 재정의 가능.
#   --workers=2        → 2개씩 묶어서 병렬
#
# 새 기간 추가 방법:
#   아래 목록에 항목 하나만 추가하면 backtest + compare 가 자동으로 실행됩니다.
#   (Makefile 수정 불필요)
#
# 예시 — 추가 가능한 항목:
#   - label: 2015-2020
#     from: "2015-01-01"
#     to:   "2021-01-01"
#     markets: [all]

workers: 2   # 0 = 기간 수 만큼 병렬 (권장). 1 = 순차 실행.  2 = 2개씩 묶어서 병렬.  

periods:
  - label: full
    from: "2000-01-01"
    markets: [all, kr, us]

  - label: 5y
    rolling: "5y"
    markets: [all, kr, us]

  - label: 2010-2020
    from: "2010-01-01"
    to:   "2021-01-01"
    markets: [all, kr, us]

  - label: 2000-2015
    from: "2000-01-01"
    to:   "2016-01-01"
    markets: [all, kr, us]
